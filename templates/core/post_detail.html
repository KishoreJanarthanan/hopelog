{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="card">
    <h1>{{ post.title }}</h1>
    <p style="color:#777; font-size:0.85rem;">
        Created: {{ post.created_at|date:"N j, Y" }} &nbsp;|&nbsp;
        Updated: {{ post.updated_at|date:"N j, Y" }}
    </p>
    <hr style="margin: 1rem 0; border: none; border-top: 1px solid #eee;">
    <p>{{ post.content|linebreaks }}</p>
    <div style="margin-top:1.5rem;">
        <a href="{% url 'post-list' %}" class="btn btn-secondary">← Back</a>
        <a href="{% url 'post-update' post.pk %}" class="btn btn-primary" style="margin-left:0.5rem;">Edit</a>
        <a href="{% url 'post-delete' post.pk %}" class="btn btn-danger" style="margin-left:0.5rem;">Delete</a>
    </div>
</div>
{% endblock %}
